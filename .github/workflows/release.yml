name: Build and Release

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Fetch upstream game version
        id: upstream
        run: |
          HTML=$(curl -sL "https://raw.githubusercontent.com/Gzh0821/pvzge_web/refs/heads/master/docs/index.html")
          VERSION=$(echo "$HTML" | grep -oP '(?<=PvZ2 Gardendless Online \| )[\d.]+(?=</title>)')
          echo "Upstream version: $VERSION"
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Compare with latest tag
        id: version
        run: |
          UPSTREAM="${{ steps.upstream.outputs.VERSION }}"
          LATEST_TAG=$(git tag --sort=-v:refname | head -1 | sed 's/^v//')
          echo "Upstream: $UPSTREAM"
          echo "Latest tag: ${LATEST_TAG:-none}"
          if [ "$UPSTREAM" = "$LATEST_TAG" ]; then
            echo "Version unchanged — skipping"
            echo "BUILD=false" >> $GITHUB_OUTPUT
          else
            echo "New version: $UPSTREAM (was: ${LATEST_TAG:-none})"
            echo "BUILD=true" >> $GITHUB_OUTPUT
          fi

      - uses: actions/setup-java@v4
      - name: Setup Android SDK
        if: steps.version.outputs.BUILD == 'true'
        run: |
          ANDROID_HOME=/usr/local/lib/android/sdk
          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
          # Install API 35 if not already present
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-35" "build-tools;35.0.0" > /dev/null 2>&1 || true

      - name: Update version
        if: steps.version.outputs.BUILD == 'true'
        run: |
          V="${{ steps.upstream.outputs.VERSION }}"
          CURRENT_CODE=$(grep -oP 'versionCode\s*=\s*\K\d+' app/build.gradle.kts)
          NEW_CODE=$((CURRENT_CODE + 1))
          sed -i "s/versionCode = $CURRENT_CODE/versionCode = $NEW_CODE/" app/build.gradle.kts
          sed -i "s/versionName = \".*\"/versionName = \"$V\"/" app/build.gradle.kts
          echo "versionCode $CURRENT_CODE -> $NEW_CODE, versionName -> $V"

      - name: Build APK
        if: steps.version.outputs.BUILD == 'true'
        run: ./gradlew assembleRelease --no-daemon

      - name: Create release
        if: steps.version.outputs.BUILD == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.upstream.outputs.VERSION }}
          name: v${{ steps.upstream.outputs.VERSION }}
          body: |
            Auto-built from upstream [PvZ2 Gardendless Online ${{ steps.upstream.outputs.VERSION }}](https://github.com/Gzh0821/pvzge_web).

            APK includes all game assets — no network required after install.
          files: app/build/outputs/apk/release/app-release.apk
